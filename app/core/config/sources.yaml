# RSS source catalogue.
#
# This file is the declarative source of truth for feeds. Edit it and run
# `python main.py collect` (or `list-sources --sync`) — no code changes needed.
#
# Fields per source:
#   slug              unique stable id (required)
#   name              display name (required)
#   feed_url          RSS/Atom URL (required)
#   site_url          homepage, used in the report
#   default_category  category slug applied when the classifier is unsure
#   quality_weight    0.0-1.0, drives the "Source Quality" scoring component
#   is_active         set false to disable without deleting
#   language          feed language code

defaults:
  quality_weight: 0.7
  is_active: true
  language: en
groups:
  general:
    default_category: big-tech
    sources:
    - slug: techcrunch
      name: TechCrunch
      feed_url: https://techcrunch.com/feed/
      site_url: https://techcrunch.com
      default_category: startups
      quality_weight: 0.75
    - slug: the-verge
      name: The Verge
      feed_url: https://www.theverge.com/rss/index.xml
      site_url: https://www.theverge.com
      quality_weight: 0.75
    - slug: ars-technica
      name: Ars Technica
      feed_url: https://feeds.arstechnica.com/arstechnica/index
      site_url: https://arstechnica.com
